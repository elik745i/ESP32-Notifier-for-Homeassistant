input_text:
  esp32_notifier_play_url:
    name: ESP32 Notifier URL
    max: 255

input_number:
  esp32_notifier_volume:
    name: ESP32 Notifier Volume
    min: 0
    max: 100
    step: 1

sensor:
  - platform: mqtt
    name: ESP32 Notifier Playback State
    unique_id: esp32_notifier_playback_state_package
    state_topic: esp32_notifier/state/playback
    value_template: "{{ value_json.state }}"

  - platform: mqtt
    name: ESP32 Notifier Current Title
    unique_id: esp32_notifier_current_title_package
    state_topic: esp32_notifier/state/playback
    value_template: "{{ value_json.title }}"

  - platform: mqtt
    name: ESP32 Notifier Battery Voltage
    unique_id: esp32_notifier_battery_voltage_package
    state_topic: esp32_notifier/state/battery
    device_class: voltage
    unit_of_measurement: V
    state_class: measurement
    suggested_display_precision: 2
    value_template: "{{ value_json.voltage | float(0) | round(2) }}"

  - platform: mqtt
    name: ESP32 Notifier Wi-Fi RSSI
    unique_id: esp32_notifier_wifi_rssi_package
    state_topic: esp32_notifier/state/network
    device_class: signal_strength
    unit_of_measurement: dBm
    state_class: measurement
    value_template: "{{ value_json.wifiRssi }}"

binary_sensor:
  - platform: mqtt
    name: ESP32 Notifier Online
    unique_id: esp32_notifier_online_package
    state_topic: esp32_notifier/availability
    payload_on: online
    payload_off: offline

number:
  - platform: mqtt
    name: ESP32 Notifier Volume Raw
    unique_id: esp32_notifier_volume_raw_package
    state_topic: esp32_notifier/state/volume
    command_topic: esp32_notifier/cmd/volume
    min: 0
    max: 100
    step: 1
    command_template: >-
      {{ {'volumePercent': value | int } | tojson }}

template:
  - sensor:
      - name: ESP32 Notifier Volume Level
        unique_id: esp32_notifier_volume_level_package
        state: >-
          {{ (states('number.esp32_notifier_volume_raw') | float(0) / 100) | round(2) }}

media_player:
  - platform: universal
    name: ESP32 Notifier
    unique_id: esp32_notifier_universal_player
    device_class: speaker
    state_template: >-
      {% set online = is_state('binary_sensor.esp32_notifier_online', 'on') %}
      {% set playback = states('sensor.esp32_notifier_playback_state') %}
      {% if not online %}
        off
      {% elif playback in ['playing', 'buffering'] %}
        playing
      {% elif playback in ['paused'] %}
        paused
      {% else %}
        idle
      {% endif %}
    commands:
      media_stop:
        action: script.esp32_notifier_stop
      media_play:
        action: script.esp32_notifier_play_url
        data:
          url: "{{ states('input_text.esp32_notifier_play_url') }}"
          label: "{{ states('sensor.esp32_notifier_current_title') }}"
          type: stream
      play_media:
        action: script.esp32_notifier_play_media
        data:
          media_content_id: "{{ media_content_id }}"
          media_content_type: "{{ media_content_type | default('music', true) }}"
          announce: "{{ announce | default(false) }}"
          title: >-
            {% if extra is mapping and extra.title is defined and extra.title %}
              {{ extra.title }}
            {% else %}
              {{ media_content_id }}
            {% endif %}
      volume_set:
        action: script.esp32_notifier_set_volume
        data:
          volume: "{{ (volume_level | float(0) * 100) | round(0) | int }}"
    attributes:
      volume_level: sensor.esp32_notifier_volume_level

script:
  esp32_notifier_play_url:
    alias: ESP32 Notifier Play URL
    mode: restart
    fields:
      url:
        required: true
        selector:
          text:
      label:
        selector:
          text:
      type:
        selector:
          select:
            options:
              - stream
              - media
              - tts
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/play
          qos: 1
          retain: false
          payload: >-
            {{ {
              'url': url,
              'label': label | default('', true),
              'type': type | default('stream', true)
            } | tojson }}

  esp32_notifier_play_media:
    alias: ESP32 Notifier Play Media
    description: Accepts Home Assistant media-player style fields and forwards them to the notifier MQTT bridge.
    mode: restart
    fields:
      media_content_id:
        required: true
        selector:
          text:
      media_content_type:
        selector:
          text:
      announce:
        selector:
          boolean:
      title:
        selector:
          text:
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/play
          qos: 1
          retain: false
          payload: >-
            {{ {
              'media_content_id': media_content_id,
              'media_content_type': media_content_type | default('music', true),
              'announce': announce | default(false),
              'title': title | default('', true)
            } | tojson }}

  esp32_notifier_stop:
    alias: ESP32 Notifier Stop
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/stop
          qos: 1
          payload: stop

  esp32_notifier_set_volume:
    alias: ESP32 Notifier Set Volume
    fields:
      volume:
        required: true
        selector:
          number:
            min: 0
            max: 100
            step: 1
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/volume
          qos: 1
          payload: >-
            {{ {'volumePercent': volume | int } | tojson }}

  esp32_notifier_speak_url:
    alias: ESP32 Notifier Speak From URL
    description: Use this when your TTS engine already exposes a direct MP3/HTTP URL.
    mode: restart
    fields:
      tts_url:
        required: true
        selector:
          text:
      preview:
        selector:
          text:
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/tts
          qos: 1
          retain: false
          payload: >-
            {{ {
              'url': tts_url,
              'label': preview | default('TTS', true),
              'type': 'tts'
            } | tojson }}
