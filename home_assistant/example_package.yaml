input_text:
  esp32_notifier_play_url:
    name: ESP32 Notifier URL
    max: 255

  esp32_notifier_source_1_name:
    name: ESP32 Notifier Source 1 Name
    max: 64
    initial: Lo-fi Radio

  esp32_notifier_source_1_url:
    name: ESP32 Notifier Source 1 URL
    max: 255
    initial: https://streams.ilovemusic.de/iloveradio17.mp3

  esp32_notifier_source_2_name:
    name: ESP32 Notifier Source 2 Name
    max: 64
    initial: BBC World Service

  esp32_notifier_source_2_url:
    name: ESP32 Notifier Source 2 URL
    max: 255
    initial: https://stream.live.vc.bbcmedia.co.uk/bbc_world_service

  esp32_notifier_source_3_name:
    name: ESP32 Notifier Source 3 Name
    max: 64
    initial: SomaFM Groove Salad

  esp32_notifier_source_3_url:
    name: ESP32 Notifier Source 3 URL
    max: 255
    initial: https://ice1.somafm.com/groovesalad-128-mp3

  esp32_notifier_source_4_name:
    name: ESP32 Notifier Source 4 Name
    max: 64
    initial: Ambient Sleeping Pill

  esp32_notifier_source_4_url:
    name: ESP32 Notifier Source 4 URL
    max: 255
    initial: https://radio.stereoscenic.com/asp-h

input_number:
  esp32_notifier_volume:
    name: ESP32 Notifier Volume
    min: 0
    max: 100
    step: 1

mqtt:
  sensor:
    - name: ESP32 Notifier Playback State
      unique_id: esp32_notifier_playback_state_package
      state_topic: esp32_notifier/state/playback
      value_template: "{{ value_json.state }}"

    - name: ESP32 Notifier Current Title
      unique_id: esp32_notifier_current_title_package
      state_topic: esp32_notifier/state/playback
      value_template: "{{ value_json.title }}"

    - name: ESP32 Notifier Current Source
      unique_id: esp32_notifier_current_source_package
      state_topic: esp32_notifier/state/playback
      value_template: >-
        {% set source = value_json.source | default('', true) | trim %}
        {{ source if source else 'Custom URL' }}

    - name: ESP32 Notifier Battery Voltage
      unique_id: esp32_notifier_battery_voltage_package
      state_topic: esp32_notifier/state/battery
      device_class: voltage
      unit_of_measurement: V
      state_class: measurement
      suggested_display_precision: 2
      value_template: "{{ value_json.voltage | float(0) | round(2) }}"

    - name: ESP32 Notifier Wi-Fi RSSI
      unique_id: esp32_notifier_wifi_rssi_package
      state_topic: esp32_notifier/state/network
      device_class: signal_strength
      unit_of_measurement: dBm
      state_class: measurement
      value_template: "{{ value_json.wifiRssi }}"

  binary_sensor:
    - name: ESP32 Notifier Online
      unique_id: esp32_notifier_online_package
      state_topic: esp32_notifier/availability
      payload_on: online
      payload_off: offline

  number:
    - name: ESP32 Notifier Volume Raw
      unique_id: esp32_notifier_volume_raw_package
      state_topic: esp32_notifier/state/volume
      command_topic: esp32_notifier/cmd/volume
      min: 0
      max: 100
      step: 1
      command_template: >-
        {{ {'volumePercent': value | int } | tojson }}

template:
  - sensor:
      - name: ESP32 Notifier Volume Level
        unique_id: esp32_notifier_volume_level_package
        state: >-
          {{ (states('number.esp32_notifier_volume_raw') | float(0) / 100) | round(2) }}

      - name: ESP32 Notifier Source Catalog
        unique_id: esp32_notifier_source_catalog_package
        state: >-
          {% set current = states('sensor.esp32_notifier_current_source') | trim %}
          {{ current if current else 'Custom URL' }}
        attributes:
          source_list: >-
            {% set candidates = [
              states('input_text.esp32_notifier_source_1_name') | trim,
              states('input_text.esp32_notifier_source_2_name') | trim,
              states('input_text.esp32_notifier_source_3_name') | trim,
              states('input_text.esp32_notifier_source_4_name') | trim,
              'Custom URL'
            ] %}
            {{ candidates | reject('equalto', '') | unique | list }}

media_player:
  - platform: universal
    name: ESP32 Notifier
    unique_id: esp32_notifier_universal_player
    device_class: speaker
    state_template: >-
      {% set online = is_state('binary_sensor.esp32_notifier_online', 'on') %}
      {% set playback = states('sensor.esp32_notifier_playback_state') %}
      {% if not online %}
        off
      {% elif playback in ['playing', 'buffering'] %}
        playing
      {% elif playback in ['paused'] %}
        paused
      {% else %}
        idle
      {% endif %}
    commands:
      media_stop:
        action: script.esp32_notifier_stop
      media_play:
        action: script.esp32_notifier_play_selected_source
        data:
          source: "{{ states('sensor.esp32_notifier_source_catalog') }}"
      play_media:
        action: script.esp32_notifier_play_media
        data:
          media_content_id: "{{ media_content_id }}"
          media_content_type: "{{ media_content_type | default('music', true) }}"
          announce: "{{ announce | default(false) }}"
          source: >-
            {% if extra is mapping and extra.source is defined and extra.source %}
              {{ extra.source }}
            {% else %}
              Custom URL
            {% endif %}
          title: >-
            {% if extra is mapping and extra.title is defined and extra.title %}
              {{ extra.title }}
            {% else %}
              {{ media_content_id }}
            {% endif %}
      select_source:
        action: script.esp32_notifier_play_selected_source
        data:
          source: "{{ source }}"
      volume_set:
        action: script.esp32_notifier_set_volume
        data:
          volume: "{{ (volume_level | float(0) * 100) | round(0) | int }}"
    attributes:
      source: sensor.esp32_notifier_source_catalog
      source_list: sensor.esp32_notifier_source_catalog|source_list
      volume_level: sensor.esp32_notifier_volume_level

script:
  esp32_notifier_play_selected_source:
    alias: ESP32 Notifier Play Selected Source
    mode: restart
    fields:
      source:
        selector:
          text:
    sequence:
      - variables:
          source_name: >-
            {% set requested = source | default('', true) | trim %}
            {% if requested %}
              {{ requested }}
            {% else %}
              {{ states('sensor.esp32_notifier_source_catalog') | trim or 'Custom URL' }}
            {% endif %}
          playback_url: >-
            {% set name = source | default('', true) | trim %}
            {% if not name %}
              {% set name = states('sensor.esp32_notifier_source_catalog') | trim %}
            {% endif %}
            {% if name == states('input_text.esp32_notifier_source_1_name') | trim %}
              {{ states('input_text.esp32_notifier_source_1_url') | trim }}
            {% elif name == states('input_text.esp32_notifier_source_2_name') | trim %}
              {{ states('input_text.esp32_notifier_source_2_url') | trim }}
            {% elif name == states('input_text.esp32_notifier_source_3_name') | trim %}
              {{ states('input_text.esp32_notifier_source_3_url') | trim }}
            {% elif name == states('input_text.esp32_notifier_source_4_name') | trim %}
              {{ states('input_text.esp32_notifier_source_4_url') | trim }}
            {% else %}
              {{ states('input_text.esp32_notifier_play_url') | trim }}
            {% endif %}
      - if:
          - condition: template
            value_template: "{{ playback_url | length > 0 }}"
        then:
          - action: script.esp32_notifier_play_url
            data:
              url: "{{ playback_url }}"
              label: "{{ source_name }}"
              source: "{{ source_name }}"
              type: stream

  esp32_notifier_play_url:
    alias: ESP32 Notifier Play URL
    mode: restart
    fields:
      url:
        required: true
        selector:
          text:
      label:
        selector:
          text:
      source:
        selector:
          text:
      type:
        selector:
          select:
            options:
              - stream
              - media
              - tts
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/play
          qos: 1
          retain: false
          payload: >-
            {{ {
              'url': url,
              'label': label | default('', true),
              'source': source | default('', true),
              'type': type | default('stream', true)
            } | tojson }}

  esp32_notifier_play_media:
    alias: ESP32 Notifier Play Media
    description: Accepts Home Assistant media-player style fields and forwards them to the notifier MQTT bridge.
    mode: restart
    fields:
      media_content_id:
        required: true
        selector:
          text:
      media_content_type:
        selector:
          text:
      announce:
        selector:
          boolean:
      source:
        selector:
          text:
      title:
        selector:
          text:
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/play
          qos: 1
          retain: false
          payload: >-
            {{ {
              'media_content_id': media_content_id,
              'media_content_type': media_content_type | default('music', true),
              'announce': announce | default(false),
              'source': source | default('Custom URL', true),
              'title': title | default('', true)
            } | tojson }}

  esp32_notifier_stop:
    alias: ESP32 Notifier Stop
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/stop
          qos: 1
          payload: stop

  esp32_notifier_set_volume:
    alias: ESP32 Notifier Set Volume
    fields:
      volume:
        required: true
        selector:
          number:
            min: 0
            max: 100
            step: 1
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/volume
          qos: 1
          payload: >-
            {{ {'volumePercent': volume | int } | tojson }}

  esp32_notifier_speak_url:
    alias: ESP32 Notifier Speak From URL
    description: Use this when your TTS engine already exposes a direct MP3/HTTP URL.
    mode: restart
    fields:
      tts_url:
        required: true
        selector:
          text:
      preview:
        selector:
          text:
    sequence:
      - action: mqtt.publish
        data:
          topic: esp32_notifier/cmd/tts
          qos: 1
          retain: false
          payload: >-
            {{ {
              'url': tts_url,
              'label': preview | default('TTS', true),
              'type': 'tts'
            } | tojson }}
