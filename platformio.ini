[platformio]
; Switch the active build target by uncommenting one profile below.
; default_envs = esp32_notifier
; default_envs = esp32_notifier_hacs
; default_envs = esp32_notifier_hacs_slim
; default_envs = esp32s3_notifier
default_envs = esp32s3_notifier_hacs
; default_envs = esp32_notifier

[common]
common_build_flags =
    -Wall
    -Wextra
    -Wno-missing-field-initializers
    -std=gnu++2a
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

[env:esp32_notifier]
platform = espressif32 @ ^6.7.0
board = esp32dev
framework = arduino
; upload_port and monitor_port are intentionally omitted so PlatformIO can
; auto-discover the connected ESP32 serial adapter instead of hardcoding COMx.
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions/ota_4m.csv
board_build.filesystem = littlefs
lib_deps =
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.7.6
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.1.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SSD1306 @ ^2.5.11
    adafruit/Adafruit SH110X @ ^2.1.12
build_flags =
    ${common.common_build_flags}
    -DAPP_DEBUG=1
build_unflags =
    -std=gnu++11
extra_scripts =
    pre:scripts/asset_embed.py

[env:esp32_notifier_hacs]
extends = env:esp32_notifier
build_flags =
    ${common.common_build_flags}
    -DAPP_DEBUG=0
    -DAPP_ENABLE_HACS_MQTT=1

[env:esp32_notifier_hacs_slim]
extends = env:esp32_notifier
build_flags =
    ${common.common_build_flags}
    -DAPP_DEBUG=0
    -DAPP_DISABLE_WEB_UI=1
    -DAPP_ENABLE_HACS_MQTT=1

[env:esp32s3_notifier]
extends = env:esp32_notifier
board = esp32-s3-devkitm-1
board_upload.flash_size = 4MB
board_build.partitions = partitions/ota_4m.csv
build_flags =
    ${common.common_build_flags}
    -DAPP_DEBUG=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DAPP_DEFAULT_STATUS_LED_PIN=48
    -DAPP_DEFAULT_BATTERY_ADC_PIN=4
    -DAPP_DEFAULT_I2S_DOUT_PIN=12
    -DAPP_DEFAULT_I2S_WS_PIN=11
    -DAPP_DEFAULT_I2S_BCLK_PIN=10
    -DAPP_DEFAULT_OLED_SDA_PIN=8
    -DAPP_DEFAULT_OLED_SCL_PIN=9

[env:esp32s3_notifier_hacs]
extends = env:esp32s3_notifier
build_flags =
    ${common.common_build_flags}
    -DAPP_DEBUG=0
    -DAPP_ENABLE_HACS_MQTT=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DAPP_DEFAULT_STATUS_LED_PIN=48
    -DAPP_DEFAULT_BATTERY_ADC_PIN=4
    -DAPP_DEFAULT_I2S_DOUT_PIN=12
    -DAPP_DEFAULT_I2S_WS_PIN=11
    -DAPP_DEFAULT_I2S_BCLK_PIN=10
    -DAPP_DEFAULT_OLED_SDA_PIN=8
    -DAPP_DEFAULT_OLED_SCL_PIN=9
