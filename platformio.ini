[platformio]
default_envs = esp32_notifier

[env:esp32_notifier]
platform = espressif32 @ ^6.7.0
board = esp32dev
framework = arduino
; upload_port and monitor_port are intentionally omitted so PlatformIO can
; auto-discover the connected ESP32 serial adapter instead of hardcoding COMx.
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions/ota_4m.csv
board_build.filesystem = littlefs
board_build.extra_flags =
    -DAPP_DEBUG=1
    -DASYNCWEBSERVER_REGEX=1
lib_deps =
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.7.6
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.1.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SSD1306 @ ^2.5.11
    adafruit/Adafruit SH110X @ ^2.1.12
build_flags =
    -Wall
    -Wextra
    -Wno-missing-field-initializers
    -std=gnu++2a
build_unflags =
    -std=gnu++11
extra_scripts =
    pre:scripts/asset_embed.py
